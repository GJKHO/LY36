<!DOCTYPE html>
<html manifest="offline.appcache">
<head>
    <meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<title>Music Line 3D</title>
	
	<!-- Allow fullscreen mode on iOS devices. (These are Apple specific meta tags.) -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
	<meta name="HandheldFriendly" content="true" />
	
	<!-- Chrome for Android web app tags -->
	<meta name="mobile-web-app-capable" content="yes" />
	<link rel="shortcut icon" sizes="256x256" href="icon-256.png" />

    <!-- All margins and padding must be zero for the canvas to fill the screen. -->
	<style type="text/css">
		* {
			padding: 0;
			margin: 0;
		}
		html, body {
			background: #000;
			color: #fff;
			overflow: hidden;
			touch-action: none;
			-ms-touch-action: none;
		}
		canvas {
			touch-action-delay: none;
			touch-action: none;
			-ms-touch-action: none;
		}
		#tg-ad-layer {
			position: fixed;
			bottom: 16px;
			left: 16px;
			z-index: 99999;
			display: flex;
			flex-direction: column;
			align-items: flex-start;
			gap: 8px;
			pointer-events: none;
		}
		#tg-reward-btn {
			pointer-events: auto;
			font-size: 15px;
			padding: 10px 18px;
			background: linear-gradient(135deg, #00b4d8, #0096c7);
			color: #fff;
			border: none;
			border-radius: 10px;
			box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
			cursor: pointer;
			display: none;
		}
		#tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
		#tg-score-toast {
			pointer-events: none;
			font-size: 20px;
			font-weight: bold;
			color: #FFD700;
			text-shadow: 0 0 8px #000;
			display: none;
			animation: floatUp 1.2s ease forwards;
		}
		@keyframes floatUp {
			0%   { opacity: 1; transform: translateY(0); }
			100% { opacity: 0; transform: translateY(-60px); }
		}
    </style>

	<!-- Telegram Web App SDK：必须在其他脚本之前加载 -->
	<script src="https://telegram.org/js/telegram-web-app.js"></script>
	<script type="text/javascript">
		try {
			window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready();
			window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.expand();
		} catch (e) {
			console.log('Telegram WebApp init failed:', e);
		}
	</script>
	<!-- Adsgram 激励广告 SDK -->
	<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

</head>
 
<body> 
	<div id="fb-root"></div>
	
	<script>
	// Issue a warning if trying to preview an exported project on disk.
	(function(){
		// Check for running exported on file protocol
		if (window.location.protocol.substr(0, 4) === "file")
		{
			alert("Exported games won't work until you upload them. (When running on the file:/// protocol, browsers block many features from working for security reasons.)");
		}
	})();
	</script>
	
	<!-- The canvas must be inside a div called c2canvasdiv -->
	<div id="c2canvasdiv">
	
		<!-- The canvas the project will render to.  If you change its ID, don't forget to change the
		ID the runtime looks for in the jQuery events above (ready() and cr_sizeCanvas()). -->
		<canvas id="c2canvas" width="414" height="736">
			<!-- This text is displayed if the visitor's browser does not support HTML5.
			You can change it, but it is a good idea to link to a description of a browser
			and provide some links to download some popular HTML5-compatible browsers. -->
			<h1>Your browser does not appear to support HTML5.  Try upgrading your browser to the latest version. </h1>
		</canvas>
		
	</div>
	
	<!-- Pages load faster with scripts at the bottom -->
	
	<!-- Construct 2 exported games require jQuery. -->
	<script src="jquery-2.1.1.min.js"></script>


	
    <!-- The runtime script.  You can rename it, but don't forget to rename the reference here as well.
    This file will have been minified and obfuscated if you enabled "Minify script" during export. -->
	<script src="c2runtime.js?2019"></script>

    <script>
		// Start the Construct 2 project running on window load.
		jQuery(document).ready(function ()
		{			
			// Create new runtime using the c2canvas
			cr_createRuntime("c2canvas");
		});
		
		// Pause and resume on page becoming visible/invisible
		function onVisibilityChanged() {
			if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
				cr_setSuspended(true);
			else
				cr_setSuspended(false);
		};
		
		document.addEventListener("visibilitychange", onVisibilityChanged, false);
		document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
		
		function OnRegisterSWError(e)
		{
			console.warn("Failed to register service worker: ", e);
		};
		
		// Runtime calls this global method when ready to start caching (i.e. after startup).
		// This registers the service worker which caches resources for offline support.
		window.C2_RegisterSW = function C2_RegisterSW()
		{
			if (!navigator.serviceWorker)
				return;		// no SW support, ignore call
			
			try {
				navigator.serviceWorker.register("sw.js", { scope: "./" })
				.then(function (reg)
				{
					console.log("Registered service worker on " + reg.scope);
				})
				.catch(OnRegisterSWError);
			}
			catch (e)
			{
				OnRegisterSWError(e);
			}
		};
    </script>

	<!-- Adsgram 广告层 -->
	<div id="tg-ad-layer">
		<div id="tg-score-toast">+200 pts</div>
		<button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200 pts</button>
	</div>

	<script type="text/javascript">
	(function () {
		var AdController = null;      // 激励广告
		var IntAdController = null;   // 插屏广告

		// 从 ID.txt 读取广告 Block ID，格式：KEY=VALUE，每行一条
		function loadConfig(cb) {
			fetch('ID.txt?_=' + Date.now())
				.then(function (r) { return r.text(); })
				.then(function (text) {
					var cfg = {};
					text.split('\n').forEach(function (line) {
						var parts = line.trim().split('=');
						if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
					});
					cb(cfg);
				})
				.catch(function () { cb({}); });
		}

		function initAds(cfg) {
			if (!window.Adsgram) return;
			var rewardId = cfg['REWARD_BLOCK_ID'] || '';
			var intId    = cfg['INT_BLOCK_ID']    || '';
			try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch (e) {}
			try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch (e) {}

			document.getElementById('tg-reward-btn').style.display = 'block';
			startIntAdTimer();
		}

		function waitAndInit(cfg) {
			if (window.Adsgram) {
				initAds(cfg);
			} else {
				var sdkCheck = setInterval(function () {
					if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
				}, 300);
			}
		}

		// 先读配置，再初始化广告
		loadConfig(function (cfg) {
			waitAndInit(cfg);
		});

		// 激励广告：看完 +200 分
		window.tgShowRewardAd = function () {
			if (!AdController) return;
			var btn = document.getElementById('tg-reward-btn');
			btn.disabled = true;
			AdController.show().then(function () {
				// 通知游戏加分（游戏脚本可覆盖此函数）
				if (typeof window.onAdsgramReward === 'function') {
					window.onAdsgramReward(200);
				}
				// 浮动提示
				var toast = document.getElementById('tg-score-toast');
				toast.style.display = 'block';
				toast.style.animation = 'none';
				setTimeout(function () {
					toast.style.animation = 'floatUp 1.2s ease forwards';
					setTimeout(function () { toast.style.display = 'none'; }, 1200);
				}, 20);
				// 60 秒冷却
				var cd = 60;
				btn.textContent = '⏳ ' + cd + 's';
				var cdTimer = setInterval(function () {
					cd--;
					if (cd <= 0) {
						clearInterval(cdTimer);
						btn.disabled = false;
						btn.textContent = '📺 Watch Ad +200 pts';
					} else {
						btn.textContent = '⏳ ' + cd + 's';
					}
				}, 1000);
			}).catch(function () {
				btn.disabled = false;
			});
		};

		// 插屏广告：每 30 秒自动弹出
		var intAdInterval = null;
		function startIntAdTimer() {
			intAdInterval = setInterval(function () {
				if (!IntAdController) return;
				IntAdController.show().then(function () {}).catch(function () {});
			}, 30000);
		}
	})();
	</script>
</body>
</html>
